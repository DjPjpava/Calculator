<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPhone Calculator</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="phone">

  <!-- Status Bar -->
  <div class="status-bar">
    <span>9:41</span>
    <span>📶 🔋</span>
  </div>

  <!-- Display -->
  <div class="display-container">
    <div class="display" id="display">0</div>
  </div>

  <!-- Buttons -->
  <div class="buttons">

    <button class="gray" onclick="clearDisplay()">AC</button>
    <button class="gray" onclick="toggleSign()">±</button>
    <button class="gray" onclick="append('%')">%</button>
    <button class="orange" onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="orange" onclick="append('*')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="orange" onclick="append('-')">−</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="orange" onclick="append('+')">+</button>

    <button class="zero" onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button class="orange equal" onclick="calculate()">=</button>

  </div>

  <!-- History -->
  <div class="history">
    <h4>📜 History</h4>
    <ul id="historyList"></ul>
  </div>

</div>

<!-- Sound -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
